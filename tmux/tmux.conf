# --- General ---
# Lower escape-time so Option key combos are instant (default 500ms is terrible)
set -g escape-time 10

# --- Prefix ---
# Default was C-b; changed to C-\ to avoid collisions and free up C-b
set -g prefix C-\\
bind C-\\ send-prefix

# --- macOS Terminal Note ---
# For Option key to work as Meta in tmux, configure your terminal:
#   iTerm2: Settings > Profiles > Keys > Left Option Key = Esc+
#   Terminal.app: Preferences > Profiles > Keyboard > Use Option as Meta key
#   Alacritty: alt_send_esc = true (default)
#   Kitty: macos_option_as_alt yes

# --- Window Navigation (Direct Access) ---
bind -n M-0 select-window -t 0   # neovim
bind -n M-1 select-window -t 1   # opencode
bind -n M-2 select-window -t 2   # codex
bind -n M-3 select-window -t 3   # claude-code

# Toggle between window 0 (neovim) and the previously active window
bind -n M-m if -F '#{==:#{window_index},0}' 'last-window' 'select-window -t 0'

# --- Pane Traversal ---
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- Pane Resizing (Ctrl + Option + Arrow Keys) ---
bind -n C-M-Up    resize-pane -U 2
bind -n C-M-Down  resize-pane -D 2
bind -n C-M-Left  resize-pane -L 2
bind -n C-M-Right resize-pane -R 2

# --- Pane Splitting (Ctrl + Option) ---
# C-M-h: split horizontally (panes side by side)
# C-M-v: split vertically (panes stacked)
bind -n C-M-h split-window -h -c "#{pane_current_path}"
bind -n C-M-v split-window -v -c "#{pane_current_path}"

# --- TPM bootstrap ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

# where to store resurrect data (default is fine, but explicit here)
set -g @resurrect-dir '~/.tmux/resurrect'

# tmux-resurrect: include vim/nvim panes, etc.
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum: automatically save every 15 minutes
set -g @continuum-save-interval '15'

# enable automatic restore when tmux starts
set -g @continuum-restore 'on'

# --- tmux-fzf ---
# Default launch: prefix + F
# Use popup window (requires tmux >= 3.2)
TMUX_FZF_OPTIONS="-p -w 70% -h 60% -m"
# Only show session and window switching (remove others if desired)
TMUX_FZF_ORDER="session|window|pane"

# Initialize TPM (keep this at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
